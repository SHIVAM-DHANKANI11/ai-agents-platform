{% extends 'base.html' %}

{% block title %}Sign Up - AI Dashboard{% endblock %}

{% block content %}
<style>
    .auth-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
        position: relative;
        overflow: hidden;
    }
    
    .auth-container::before {
        content: '';
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
        top: -200px;
        right: -200px;
        border-radius: 50%;
    }
    
    .auth-container::after {
        content: '';
        position: absolute;
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
        bottom: -100px;
        left: -100px;
        border-radius: 50%;
    }
    
    .auth-card {
        width: 100%;
        max-width: 440px;
        padding: 48px;
        position: relative;
        z-index: 1;
    }
    
    .auth-logo {
        text-align: center;
        margin-bottom: 32px;
    }
    
    .auth-logo i {
        font-size: 48px;
        background: var(--accent-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    
    .auth-logo h1 {
        font-size: 26px;
        font-weight: 700;
        margin-top: 16px;
    }
    
    .auth-logo p {
        color: var(--text-secondary);
        margin-top: 8px;
        font-size: 15px;
    }
    
    .auth-form {
        margin-top: 24px;
    }
    
    .input-wrapper {
        position: relative;
    }
    
    .input-wrapper i {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        font-size: 18px;
    }
    
    .input-wrapper .input-field {
        padding-left: 48px;
    }
    
    .input-wrapper .input-field.is-invalid {
        border-color: var(--error);
    }
    
    .input-error {
        color: var(--error);
        font-size: 13px;
        margin-top: 6px;
        margin-left: 4px;
        display: none;
    }
    
    .input-error.show {
        display: block;
    }
    
    .auth-btn {
        width: 100%;
        padding: 16px;
        font-size: 16px;
        margin-top: 16px;
    }
    
    .auth-footer {
        text-align: center;
        margin-top: 28px;
        padding-top: 28px;
        border-top: 1px solid var(--border-color);
    }
    
    .auth-footer p {
        color: var(--text-secondary);
        font-size: 15px;
    }
    
    .auth-footer a {
        color: var(--accent-primary);
        text-decoration: none;
        font-weight: 600;
    }
    
    .auth-footer a:hover {
        text-decoration: underline;
    }
    
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(10, 10, 15, 0.8);
        backdrop-filter: blur(4px);
        display: none;
        align-items: center;
        justify-content: center;
        border-radius: var(--radius-md);
        z-index: 10;
    }
    
    .loading-overlay.show {
        display: flex;
    }
    
    .terms-text {
        font-size: 13px;
        color: var(--text-muted);
        text-align: center;
        margin-top: 20px;
        line-height: 1.6;
    }
    
    .terms-text a {
        color: var(--accent-primary);
        text-decoration: none;
    }
</style>

<div class="auth-container">
    <div class="glass-card auth-card">
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
        </div>
        
        <div class="auth-logo">
            <i class="fas fa-user-plus"></i>
            <h1>Create Account</h1>
            <p>Join AI Dashboard and start your journey</p>
        </div>
        
        <form class="auth-form" id="signupForm">
            {% csrf_token %}
            
            <div class="form-group">
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" class="input-field" name="username" placeholder="Username" required>
                </div>
                <div class="input-error" id="usernameError"></div>
            </div>
            
            <div class="form-group">
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" class="input-field" name="email" placeholder="Email address" required>
                </div>
                <div class="input-error" id="emailError"></div>
            </div>
            
            <div class="form-group">
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="input-field" name="password" placeholder="Password" required>
                </div>
                <div class="input-error" id="passwordError"></div>
            </div>
            
            <div class="form-group">
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="input-field" name="password_confirm" placeholder="Confirm Password" required>
                </div>
                <div class="input-error" id="passwordConfirmError"></div>
            </div>
            
            <button type="submit" class="btn-gradient auth-btn">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
            
            <p class="terms-text">
                By signing up, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
            </p>
        </form>
        
        <div class="auth-footer">
            <p>Already have an account? <a href="{% url 'login' %}">Sign in</a></p>
        </div>
    </div>
</div>

<script>
    document.getElementById('signupForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        // Clear previous errors
        document.querySelectorAll('.input-error').forEach(el => {
            el.classList.remove('show');
            el.textContent = '';
        });
        document.querySelectorAll('.input-field').forEach(el => {
            el.classList.remove('is-invalid');
        });
        
        const loadingOverlay = document.getElementById('loadingOverlay');
        loadingOverlay.classList.add('show');
        
        const formData = new FormData(e.target);
        
        try {
            const response = await fetch('{% url "signup" %}', {
                method: 'POST',
                headers: {
                    'X-CSRFToken': getCSRFToken(),
                },
                body: formData
            });
            
            const data = await response.json();
            
            if (data.success) {
                window.location.href = data.redirect;
            } else {
                // Show field errors
                Object.keys(data.errors).forEach(field => {
                    const errorEl = document.getElementById(field + 'Error');
                    const inputEl = document.querySelector(`[name="${field}"]`);
                    if (errorEl) {
                        errorEl.textContent = data.errors[field];
                        errorEl.classList.add('show');
                    }
                    if (inputEl) {
                        inputEl.classList.add('is-invalid');
                    }
                });
            }
        } catch (error) {
            showToast('An error occurred. Please try again.', 'error');
        } finally {
            loadingOverlay.classList.remove('show');
        }
    });
</script>
{% endblock %}
