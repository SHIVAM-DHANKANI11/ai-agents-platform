{% extends 'base.html' %}
{% load socialaccount %}

{% block title %}Login - AI Dashboard{% endblock %}

{% block content %}
<style>
    .auth-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
        position: relative;
        overflow: hidden;
    }
    
    .auth-container::before {
        content: '';
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
        top: -200px;
        right: -200px;
        border-radius: 50%;
    }
    
    .auth-container::after {
        content: '';
        position: absolute;
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
        bottom: -100px;
        left: -100px;
        border-radius: 50%;
    }
    
    .auth-card {
        width: 100%;
        max-width: 420px;
        padding: 48px;
        position: relative;
        z-index: 1;
    }
    
    .auth-logo {
        text-align: center;
        margin-bottom: 40px;
    }
    
    .auth-logo i {
        font-size: 56px;
        background: var(--accent-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    
    .auth-logo h1 {
        font-size: 28px;
        font-weight: 700;
        margin-top: 16px;
        background: var(--accent-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    
    .auth-logo p {
        color: var(--text-secondary);
        margin-top: 8px;
        font-size: 15px;
    }
    
    .auth-form {
        margin-top: 32px;
    }
    
    .input-wrapper {
        position: relative;
    }
    
    .input-wrapper i {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        font-size: 18px;
    }
    
    .input-wrapper .input-field {
        padding-left: 48px;
    }
    
    .remember-forgot {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
    }
    
    .checkbox-wrapper {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
    }
    
    .checkbox-wrapper input {
        width: 18px;
        height: 18px;
        accent-color: var(--accent-primary);
        cursor: pointer;
    }
    
    .checkbox-wrapper span {
        color: var(--text-secondary);
        font-size: 14px;
    }
    
    .forgot-link {
        color: var(--accent-primary);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
    }
    
    .forgot-link:hover {
        text-decoration: underline;
    }
    
    .auth-btn {
        width: 100%;
        padding: 16px;
        font-size: 16px;
    }
    
    .auth-footer {
        text-align: center;
        margin-top: 32px;
        padding-top: 32px;
        border-top: 1px solid var(--border-color);
    }
    
    .auth-footer p {
        color: var(--text-secondary);
        font-size: 15px;
    }
    
    .auth-footer a {
        color: var(--accent-primary);
        text-decoration: none;
        font-weight: 600;
    }
    
    .auth-footer a:hover {
        text-decoration: underline;
    }
    
    .error-message {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid var(--error);
        color: var(--error);
        padding: 12px 16px;
        border-radius: var(--radius-sm);
        margin-bottom: 20px;
        display: none;
        align-items: center;
        gap: 10px;
        font-size: 14px;
    }
    
    .error-message.show {
        display: flex;
    }
    
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(10, 10, 15, 0.8);
        backdrop-filter: blur(4px);
        display: none;
        align-items: center;
        justify-content: center;
        border-radius: var(--radius-md);
        z-index: 10;
    }
    
    .loading-overlay.show {
        display: flex;
    }
</style>

<div class="auth-container">
    <div class="glass-card auth-card">
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
        </div>
        
        <div class="auth-logo">
            <i class="fas fa-robot"></i>
            <h1>AI Dashboard</h1>
            <p>Welcome back! Sign in to continue.</p>
        </div>
        
        <div class="error-message" id="errorMessage">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText"></span>
        </div>
        
        <form class="auth-form" id="loginForm">

            {% csrf_token %}
            
            <div class="form-group">
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" class="input-field" name="username" placeholder="Username or Email" required>
                </div>
            </div>
            
            <div class="form-group">
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="input-field" name="password" placeholder="Password" required>
                </div>
            </div>
            
            <div class="remember-forgot">
                <label class="checkbox-wrapper">
                    <input type="checkbox" name="remember">
                    <span>Remember me</span>
                </label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>
            
            <button type="submit" class="btn-gradient auth-btn">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const form = e.target;
        const errorDiv = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const loadingOverlay = document.getElementById('loadingOverlay');
        
        // Hide previous errors
        errorDiv.classList.remove('show');
        
        // Show loading
        loadingOverlay.classList.add('show');
        
        const formData = new FormData(form);
        
        // Get CSRF token from form or meta tag or cookie
        const csrfToken = form.querySelector('[name=csrfmiddlewaretoken]')?.value 
            || getCSRFToken() 
            || getCSRFTokenFromCookie();
        
        try {
            const response = await fetch('{% url "login" %}', {
                method: 'POST',
                headers: {
                    'X-CSRFToken': csrfToken,
                },
                body: formData
            });
            
            const data = await response.json();
            
            if (data.success) {
                window.location.href = data.redirect;
            } else {
                errorText.textContent = data.error || 'Login failed';
                errorDiv.classList.add('show');
            }
        } catch (error) {
            errorText.textContent = 'An error occurred. Please try again.';
            errorDiv.classList.add('show');
        } finally {
            loadingOverlay.classList.remove('show');
        }
    });
</script>
{% endblock %}
